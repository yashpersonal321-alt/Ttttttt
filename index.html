<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BlockCraft - Minecraft Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            overflow: hidden;
            font-family: monospace;
            background: #000;
        }
        
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* स्टार्ट स्क्रीन */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0f1e, #0d1b2a);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            flex-direction: column;
            gap: 30px;
        }
        
        .game-title {
            font-size: 48px;
            color: #ffaa00;
            text-shadow: 0 0 20px #ffaa00;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .play-btn {
            background: linear-gradient(135deg, #ffaa00, #ff6600);
            border: none;
            padding: 18px 50px;
            font-size: 28px;
            font-weight: bold;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .play-btn:active {
            transform: scale(0.95);
        }
        
        .controls-info {
            color: #aaa;
            font-size: 14px;
            text-align: center;
        }
        
        /* HUD */
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            color: white;
            text-shadow: 0 0 5px black;
            z-index: 100;
            pointer-events: none;
        }
        
        #block-info {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            border: 1px solid #ffaa00;
            white-space: nowrap;
        }
        
        #coords {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
            color: #aaa;
            font-size: 11px;
            z-index: 100;
            pointer-events: none;
        }
        
        /* मोबाइल कंट्रोल्स */
        .joystick {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            border: 2px solid rgba(255,170,0,0.5);
            z-index: 200;
            pointer-events: auto;
        }
        
        .joystick-handle {
            width: 50px;
            height: 50px;
            background: #ffaa00;
            border-radius: 25px;
            position: relative;
            top: 35px;
            left: 35px;
            transition: 0.02s;
        }
        
        .action-buttons {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 200;
            pointer-events: auto;
        }
        
        .action-btn {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #ffaa00;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        
        .action-btn:active {
            transform: scale(0.92);
            background: #ffaa00;
        }
        
        .hotbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 20px;
            z-index: 200;
            pointer-events: auto;
        }
        
        .hotbar-slot {
            width: 55px;
            height: 55px;
            background: rgba(30,30,40,0.9);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        
        .hotbar-slot.selected {
            border-color: #ffaa00;
            background: rgba(255,170,0,0.3);
            transform: scale(1.05);
        }
        
        @media (max-width: 768px) {
            .hotbar-slot { width: 48px; height: 48px; font-size: 24px; }
            .action-btn { width: 55px; height: 55px; font-size: 22px; }
            .joystick { width: 100px; height: 100px; }
            .joystick-handle { width: 42px; height: 42px; top: 29px; left: 29px; }
            .game-title { font-size: 32px; }
            .play-btn { padding: 14px 40px; font-size: 24px; }
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <div class="game-title">⛏️ BLOCKCRAFT</div>
        <button class="play-btn" id="play-btn">▶ PLAY</button>
        <div class="controls-info">
            🖱️ PC: WASD + Mouse | 📱 Mobile: Joystick<br>
            🧱 Click/Tap to place | 🔨 Hold to break
        </div>
    </div>
    
    <div id="game-elements" class="hidden">
        <div id="crosshair">+</div>
        <div id="block-info">🌿 Grass</div>
        <div id="coords">X: 0, Y: 0, Z: 0</div>
        
        <div class="joystick" id="joystick">
            <div class="joystick-handle" id="joystick-handle"></div>
        </div>
        
        <div class="action-buttons">
            <button class="action-btn" id="break-btn">🔨</button>
            <button class="action-btn" id="place-btn">🧱</button>
            <button class="action-btn" id="jump-btn">🦘</button>
        </div>
        
        <div class="hotbar" id="hotbar">
            <div class="hotbar-slot selected" data-block="grass">🌿</div>
            <div class="hotbar-slot" data-block="dirt">🟫</div>
            <div class="hotbar-slot" data-block="sand">🏖️</div>
            <div class="hotbar-slot" data-block="stone">🪨</div>
            <div class="hotbar-slot" data-block="wood">🪵</div>
            <div class="hotbar-slot" data-block="leaves">🍃</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // ============ गेम वेरिएबल्स ============
        let scene, camera, renderer;
        let gameStarted = false;
        let selectedBlock = 'grass';
        
        // प्लेयर
        let playerPos = { x: 0, y: 5, z: 0 };
        let playerRot = { x: 0, y: 0 };
        let velocityY = 0;
        let onGround = true;
        
        // इनपुट
        let keys = { w: false, s: false, a: false, d: false, space: false };
        let moveJoystick = { x: 0, z: 0 };
        let pointerLock = false;
        
        // वर्ल्ड डेटा (सिंपल - ब्लॉक्स को Map में स्टोर करेंगे)
        let worldBlocks = new Map();
        
        // ब्लॉक कलर्स
        const blockColors = {
            grass: 0x6b8c42,
            dirt: 0x8B5A2B,
            sand: 0xF4E4A0,
            stone: 0x808080,
            wood: 0x8B5A2B,
            leaves: 0x3c9e3c
        };
        
        const blockNames = {
            grass: '🌿 Grass',
            dirt: '🟫 Dirt',
            sand: '🏖️ Sand',
            stone: '🪨 Stone',
            wood: '🪵 Wood',
            leaves: '🍃 Leaves'
        };
        
        // ब्लॉक मेश स्टोर करने के लिए
        let blockMeshes = new Map();
        
        // ============ हेल्पर फंक्शन्स ============
        function getBlockKey(x, y, z) {
            return `${x},${y},${z}`;
        }
        
        function setBlock(x, y, z, type) {
            const key = getBlockKey(x, y, z);
            
            // पुराना ब्लॉक हटाएं
            if (blockMeshes.has(key)) {
                scene.remove(blockMeshes.get(key));
                blockMeshes.delete(key);
            }
            
            if (type === 'air') {
                worldBlocks.delete(key);
                return;
            }
            
            worldBlocks.set(key, type);
            
            // नया ब्लॉक बनाएं
            const geometry = new THREE.BoxGeometry(0.96, 0.96, 0.96);
            const material = new THREE.MeshStandardMaterial({ color: blockColors[type] });
            const cube = new THREE.Mesh(geometry, material);
            cube.position.set(x, y, z);
            cube.castShadow = true;
            cube.receiveShadow = true;
            scene.add(cube);
            blockMeshes.set(key, cube);
        }
        
        function getBlock(x, y, z) {
            return worldBlocks.get(getBlockKey(x, y, z)) || 'air';
        }
        
        // ============ टेरेन जेनरेशन ============
        function generateTerrain() {
            console.log("🌍 Generating terrain...");
            
            // सिंपल टेरेन - 50x50 का एरिया
            for (let x = -30; x <= 30; x++) {
                for (let z = -30; z <= 30; z++) {
                    // हाइट कैलकुलेट करें
                    let height = Math.floor(
                        Math.sin(x * 0.2) * Math.cos(z * 0.2) * 2 +
                        Math.sin(x * 0.5) * 1.5 +
                        Math.cos(z * 0.5) * 1.5 +
                        4
                    );
                    height = Math.max(1, Math.min(12, height));
                    
                    // ग्राउंड ब्लॉक्स
                    for (let y = 0; y <= height; y++) {
                        if (y === height) {
                            setBlock(x, y, z, 'grass');
                        } else if (y >= height - 2) {
                            setBlock(x, y, z, 'dirt');
                        } else {
                            setBlock(x, y, z, 'stone');
                        }
                    }
                    
                    // रेत (बीच)
                    if (height <= 2 && Math.random() < 0.3) {
                        setBlock(x, height, z, 'sand');
                    }
                    
                    // पेड़
                    if (height > 5 && height < 10 && Math.random() < 0.05) {
                        const treeHeight = 3 + Math.floor(Math.random() * 2);
                        for (let h = 1; h <= treeHeight; h++) {
                            setBlock(x, height + h, z, 'wood');
                        }
                        // पत्तियां
                        for (let lx = -1; lx <= 1; lx++) {
                            for (let lz = -1; lz <= 1; lz++) {
                                if (Math.abs(lx) + Math.abs(lz) <= 2) {
                                    setBlock(x + lx, height + treeHeight, z + lz, 'leaves');
                                }
                                if (Math.abs(lx) <= 1 && Math.abs(lz) <= 1) {
                                    setBlock(x + lx, height + treeHeight - 1, z + lz, 'leaves');
                                }
                            }
                        }
                    }
                }
            }
            
            console.log("✅ Terrain generated with", worldBlocks.size, "blocks");
        }
        
        // ============ कॉलिजन ============
        function checkCollision(x, y, z) {
            const minX = Math.floor(x - 0.3);
            const maxX = Math.ceil(x + 0.3);
            const minY = Math.floor(y);
            const maxY = Math.ceil(y + 1.6);
            const minZ = Math.floor(z - 0.3);
            const maxZ = Math.ceil(z + 0.3);
            
            for (let ix = minX; ix <= maxX; ix++) {
                for (let iy = minY; iy <= maxY; iy++) {
                    for (let iz = minZ; iz <= maxZ; iz++) {
                        const block = getBlock(ix, iy, iz);
                        if (block !== 'air' && block !== 'leaves') {
                            return true;
                        }
                    }
                }
            }
            return false;
        }
        
        // ============ रे कास्टिंग ============
        function getLookingAtBlock(maxDist = 5) {
            const direction = new THREE.Vector3(0, 0, -1);
            direction.applyQuaternion(camera.quaternion);
            
            for (let i = 0; i <= maxDist * 2; i++) {
                const dist = i * 0.5;
                const px = playerPos.x + direction.x * dist;
                const py = playerPos.y + direction.y * dist;
                const pz = playerPos.z + direction.z * dist;
                
                const bx = Math.floor(px);
                const by = Math.floor(py);
                const bz = Math.floor(pz);
                
                const block = getBlock(bx, by, bz);
                if (block !== 'air') {
                    return { x: bx, y: by, z: bz };
                }
            }
            return null;
        }
        
        function getPlacePosition(hit) {
            if (!hit) return null;
            const direction = new THREE.Vector3(0, 0, -1);
            direction.applyQuaternion(camera.quaternion);
            return {
                x: hit.x + Math.round(direction.x),
                y: hit.y + Math.round(direction.y),
                z: hit.z + Math.round(direction.z)
            };
        }
        
        // ============ गेम सेटअप ============
        function initGame() {
            // सीन
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 50, 100);
            
            // कैमरा
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.copy(playerPos);
            
            // रेंडरर
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            // लाइट्स
            const ambient = new THREE.AmbientLight(0x404060);
            scene.add(ambient);
            
            const sun = new THREE.DirectionalLight(0xfff5d1, 1);
            sun.position.set(30, 40, 20);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 512;
            sun.shadow.mapSize.height = 512;
            scene.add(sun);
            
            // टेरेन जेनरेट
            generateTerrain();
            
            // प्लेयर को सही जगह रखें
            playerPos.y = 5;
            while (!checkCollision(playerPos.x, playerPos.y - 0.1, playerPos.z) && playerPos.y > 1) {
                playerPos.y -= 0.5;
            }
            playerPos.y += 1;
            camera.position.copy(playerPos);
            
            // इवेंट्स सेटअप
            setupEvents();
            
            // एनिमेशन शुरू
            animate();
        }
        
        function setupEvents() {
            // कीबोर्ड
            document.addEventListener('keydown', (e) => {
                switch(e.code) {
                    case 'KeyW': keys.w = true; break;
                    case 'KeyS': keys.s = true; break;
                    case 'KeyA': keys.a = true; break;
                    case 'KeyD': keys.d = true; break;
                    case 'Space': keys.space = true; break;
                }
            });
            
            document.addEventListener('keyup', (e) => {
                switch(e.code) {
                    case 'KeyW': keys.w = false; break;
                    case 'KeyS': keys.s = false; break;
                    case 'KeyA': keys.a = false; break;
                    case 'KeyD': keys.d = false; break;
                    case 'Space': keys.space = false; break;
                }
            });
            
            // माउस लॉक
            renderer.domElement.addEventListener('click', () => {
                renderer.domElement.requestPointerLock();
            });
            
            document.addEventListener('pointerlockchange', () => {
                pointerLock = document.pointerLockElement === renderer.domElement;
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!pointerLock) return;
                playerRot.y -= e.movementX * 0.002;
                playerRot.x -= e.movementY * 0.002;
                playerRot.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, playerRot.x));
                camera.rotation.order = 'YXZ';
                camera.rotation.y = playerRot.y;
                camera.rotation.x = playerRot.x;
            });
            
            // बटन
            document.getElementById('place-btn')?.addEventListener('click', () => {
                const hit = getLookingAtBlock();
                const pos = getPlacePosition(hit);
                if (pos && !checkCollision(pos.x, pos.y, pos.z)) {
                    setBlock(pos.x, pos.y, pos.z, selectedBlock);
                }
            });
            
            document.getElementById('break-btn')?.addEventListener('click', () => {
                const hit = getLookingAtBlock();
                if (hit) {
                    setBlock(hit.x, hit.y, hit.z, 'air');
                }
            });
            
            document.getElementById('jump-btn')?.addEventListener('click', () => {
                if (onGround) {
                    velocityY = 5;
                    onGround = false;
                }
            });
            
            // हॉटबार
            document.querySelectorAll('.hotbar-slot').forEach(slot => {
                slot.addEventListener('click', () => {
                    document.querySelectorAll('.hotbar-slot').forEach(s => s.classList.remove('selected'));
                    slot.classList.add('selected');
                    selectedBlock = slot.dataset.block;
                    document.getElementById('block-info').innerHTML = blockNames[selectedBlock];
                });
            });
            
            // जॉयस्टिक
            const joystick = document.getElementById('joystick');
            const handle = document.getElementById('joystick-handle');
            let active = false;
            let center = { x: 0, y: 0 };
            
            joystick.addEventListener('touchstart', (e) => {
                e.preventDefault();
                active = true;
                const rect = joystick.getBoundingClientRect();
                center = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
            });
            
            joystick.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!active) return;
                const touch = e.touches[0];
                const dx = touch.clientX - center.x;
                cons
