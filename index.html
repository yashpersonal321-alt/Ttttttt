<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JARVIS V7.0 | ULTRA PRO MAX</title>
    <link href="https://fonts.googleapis            letter-spacing: 5px; animation: pulse 2s infinite;
        }

        /* --- SETTINGS MENU --- */
        #menu-dots {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            font-size: 30px; cursor: pointer; padding: 10px;
        }

        #settings-box {
            position: fixed; top: -100%; left: 0; width: 100%; height: auto;
            background: rgba(0, 10, 15, 0.95); border-bottom: 2px solid var(--glow);
            padding: 50px 20px; z-index: 999; transition: 0.5s ease-in-out;
            box-shadow: 0 0 50px #000;
        }

        .api-input {
            width: 100%; padding: 15px; background: #111; border: 1px solid var(--glow);
            color: white; border-radius: 5px; margin: 20px 0; font-family: 'Share Tech Mono';
        }

        /* --- HUD ELEMENTS --- */
        #main-hud {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            justify-content: space-between; align-items: center; padding: 20px;
            opacity: 0; transition: 1s;
        }

        .top-info {
            width: 100%; display: flex; justify-content: space-between;
            font-size: 10px; letter-spacing: 2px; text-shadow: 0 0 5px var(--glow);
        }

        /* --- ARC REACTOR --- */
        .reactor {
            position: relative; width: 300px; height: 300px;
            display: flex; justify-content: center; align-items: center;
        }

        .circle {
            position: absolute; border-radius: 50%; border: 2px solid var(--glow);
            box-shadow: inset 0 0 20px var(--glow), 0 0 20px var(--glow);
        }

        #c1 { width: 280px; height: 280px; border-style: dashed; animation: rot 10s linear infinite; }
        #c2 { width: 220px; height: 220px; border-top-color: transparent; border-bottom-color: transparent; animation: rot-rev 3s linear infinite; }
        #c3 { width: 160px; height: 160px; border-left-color: transparent; animation: rot 1s linear infinite; }

        .core {
            width: 90px; height: 90px; background: radial-gradient(#fff, var(--glow));
            border-radius: 50%; box-shadow: 0 0 50px var(--glow);
            display: flex; justify-content: center; align-items: center;
            color: #000; font-weight: 900; cursor: pointer; text-align: center;
            font-size: 12px; z-index: 10;
        }

        /* --- TERMINAL --- */
        #terminal {
            width: 100%; height: 180px; background: var(--glass);
            border: 1px solid var(--glow); border-radius: 10px; padding: 15px;
            font-family: 'Share Tech Mono'; font-size: 13px; overflow-y: auto;
            backdrop-filter: blur(10px);
        }

        /* --- ACTION BUTTONS --- */
        #execute-btn {
            display: none; width: 80%; padding: 10px; background: var(--red);
            color: white; border: none; font-family: 'Orbitron'; margin-bottom: 10px;
            box-shadow: 0 0 20px var(--red);
        }

        #img-display {
            width: 100%; max-height: 250px; border-radius: 10px;
            display: none; border: 1px solid var(--glow); margin-bottom: 10px;
        }

        /* --- ANIMATIONS --- */
        @keyframes rot { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rot-rev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .talking #c1, .talking #c2 { animation-duration: 0.5s !important; }
    </style>
</head>
<body>

    <div id="boot-screen">
        <button class="start-btn" onclick="initJarvis()">Activate Jarvis</button>
        <p style="margin-top: 20px; font-size: 10px; color: #444;">SENTINEL-X PROTOCOL V6.0</p>
    </div>

    <div id="menu-dots" onclick="toggleSettings()">⋮</div>
    <div id="settings-box">
        <h3>SYSTEM OVERRIDE</h3>
        <p style="font-size: 10px; margin-top: 10px;">Enter OpenRouter API Key:</p>
        <input type="password" id="api-key-input" class="api-input" placeholder="sk-or-v1-...">
        <button class="start-btn" style="font-size: 12px; padding: 10px;" onclick="saveAPI()">Save Protocols</button>
        <button onclick="toggleSettings()" style="background:none; border:none; color:grey; display:block; margin: 20px auto;">[ Close ]</button>
    </div>

    <div id="main-hud">
        <div class="top-info">
            <span id="time-display">00:00:00</span>
            <span style="color:white">DEVELOPER: YASH RAWAT</span>
            <span id="bat-display">BAT: 100%</span>
        </div>

        <div class="reactor" onclick="listen()">
            <div id="c1" class="circle"></div>
            <div id="c2" class="circle"></div>
            <div id="c3" class="circle"></div>
            <div class="core" id="core-text">READY</div>
        </div>

        <button id="execute-btn" onclick="manualOpen()">EXECUTE APP LAUNCH</button>
        <img id="img-display" src="" alt="AI Result">

        <div id="terminal">
            <div id="logs">System: Offline<br>Awaiting User Gesture...</div>
        </div>
    </div>

    <script>
        let API_KEY = localStorage.getItem('jarvis_key') || "";
        let recognition;
        let lastLink = "";

        // --- START SYSTEM ---
        function initJarvis() {
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('main-hud').style.opacity = '1';
            
            updateStatus();
            setInterval(updateStatus, 1000);
            
            log("Core Systems Online.");
            log("Welcome Boss Yash.");
            
            setupVoice(); // Setup recognition here
            
            setTimeout(() => {
                speak("Welcome back, Boss Yash. Sentinel-X Jarvis version 6.0 is now online. I am your advanced AI assistant, developed by Yash Rawat. All systems are green.");
            }, 500);
        }

        function toggleSettings() {
            const box = document.getElementById('settings-box');
            box.style.top = box.style.top === '0px' ? '-100%' : '0px';
        }

        function saveAPI() {
            const val = document.getElementById('api-key-input').value;
            if(val) {
                localStorage.setItem('jarvis_key', val);
                API_KEY = val;
                alert("API Protocol Updated!");
                toggleSettings();
            }
        }

        function updateStatus() {
            const now = new Date();
            document.getElementById('time-display').innerText = now.toLocaleTimeString();
            navigator.getBattery().then(b => {
                document.getElementById('bat-display').innerText = `BAT: ${Math.floor(b.level * 100)}%`;
            });
        }

        function log(msg, color = "#00f3ff") {
            const l = document.getElementById('logs');
            l.innerHTML += `<div style="color:${color}">> ${msg}</div>`;
            document.getElementById('terminal').scrollTop = l.scrollHeight;
        }

        // --- VOICE ENGINE ---
        function setupVoice() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Speech) {
                log("Speech Recognition Not Supported!", "red");
                return;
            }
            recognition = new Speech();
            recognition.continuous = false;
            recognition.lang = 'hi-IN'; // Changed to Hindi-India for better bilingual support

            recognition.onstart = () => {
                document.getElementById('core-text').innerText = "LISTENING";
                log("Listening for command...", "yellow");
            };

            recognition.onresult = async (e) => {
                const cmd = e.results[0][0].transcript.toLowerCase();
                log(`Query: ${cmd}`, "#fff");
                await processCommand(cmd);
            };

            recognition.onend = () => {
                document.getElementById('core-text').innerText = "READY";
            };
        }

        function listen() {
            if(window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                document.body.classList.remove('talking');
                document.getElementById('core-text').innerText = "READY";
            } else {
                try { 
                    recognition.start(); 
                } catch(e) {
                    console.error("Recognition Error:", e);
                }
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel(); // Stop any current speech
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = text.match(/[ह-ज्ञ]/) ? 'hi-IN' : 'en-US';
            
            utter.onstart = () => {
                document.body.classList.add('talking');
                document.getElementById('core-text').innerText = "TALKING";
            };
            utter.onend = () => {
                document.body.classList.remove('talking');
                document.getElementById('core-text').innerText = "READY";
            };
            window.speechSynthesis.speak(utter);
        }

        // --- COMMAND LOGIC ---
        async function processCommand(cmd) {
            // 1. App Opening
            const appList = {
                "facebook": "https://www.facebook.com", "fb": "https://www.facebook.com", "फेसबुक": "https://www.facebook.com",
                "youtube": "https://www.youtube.com", "yt": "https://www.youtube.com", "यूट्यूब": "https://www.youtube.com",
                "whatsapp": "whatsapp://send", "instagram": "https://www.instagram.com", "insta": "https://www.instagram.com",
                "google": "https://www.google.com", "github": "https://www.github.com"
            };

            for (let app in appList) {
                if (cmd.includes(app)) {
                    speak(`Opening ${app}, Boss.`);
                    lastLink = appList[app];
                    window.open(lastLink, '_blank');
                    return;
                }
            }

            // 2. Image Generation
            if (cmd.includes("image") || cmd.includes("फोटो") || cmd.includes("बनाओ")) {
                const prompt = cmd.replace("image", "").replace("generate", "").replace("बनाओ", "");
                speak(`Generating visual representation for: ${prompt}`);
                const img = document.getElementById('img-display');
                img.src = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1080&height=1080&nologo=true`;
                img.style.display = "block";
                return;
            }

            // 3. Time
            if (cmd.includes("time") || cmd.includes("समय")) {
                let t = new Date().toLocaleTimeString();
                speak("Boss, the time is " + t);
                return;
            }

            // 4. AI (Gemini 2.0 Flash)
            if(API_KEY) {
                log("Establishing Neural Link...");
                const aiResponse = await callAI(cmd);
                speak(aiResponse);
            } else {
                speak("Boss, API Key is required. Open settings.");
                toggleSettings();
            }
        }

        async function callAI(prompt) {
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": "google/gemini-2.0-flash-001",
                        "messages": [
                            {"role": "system", "content": "You are JARVIS V6.0. Loyal to Boss Yash Rawat. Respond briefly and smartly."},
                            {"role": "user", "content": prompt}
                        ]
                    })
                });
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (e) {
                return "Neural Link Failure. Check Internet.";
            }
        }

        function manualOpen() {
            window.open(lastLink, '_blank');
            document.getElementById('execute-btn').style.display = 'none';
        }
    </script>
</body>
</html>
